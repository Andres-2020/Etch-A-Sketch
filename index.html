<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch A Sketch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/logo-small.png" type="image/x-icon">
    <script src="script.js" defer></script>
</head>
<body>
  <header>
    <nav>
      <div class="link"><a href="https://andres-2020.github.io/odin-project-landing-page/" target="_blank">Home</a></div>
      <p>-</p>
      <div class="link"><a href="https://github.com/Andres-2020" target="_blank">Github</a></div>
    </nav>
  </header>
  <main>
    <aside>
      <p>Pick a color</p>
      <input type="color" id="color">
      <button id="random">Random</button>
      <button id="eraser">Eraser</button>
      <button id="reset">Reset</button>
      <div id="size">
        <p id="sizeText">15 x 15</p>
        <input type="range" min="1" max="30" value="15" id="range">
      </div>
    </aside>
    <section id="grid"></section>
  </main>
  <footer>
    <div class="link"><a href="https://github.com/Andres-2020/Rock-Paper-Scissors" target="_blank">How does this work?</a></div>
  </footer>
</body>
</html>
